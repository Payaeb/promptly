<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h1>Promptly</h1>
    </div>
    <div id="button-list" class="button-list">
      <!-- Buttons rendered by JS -->
    </div>
    <div id="empty-state" class="empty-state" style="display:none;">
      <p>No buttons configured yet.</p>
      <p>Add your first button to get started.</p>
      <button id="empty-state-settings" class="empty-state-button">Open Settings</button>
    </div>
    <div id="status-message" class="status-message" style="display:none;"></div>
    <div class="footer">
      <button type="button" class="footer-link" id="open-settings" style="background:none;border:none;padding:0;font:inherit;color:#888;text-decoration:none;cursor:pointer;">Settings</button>
    </div>
  </div>
  <script src="scripts/popup.js"></script>
</body>
</html>
