<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h1>Promptly</h1>
    </div>
    <div id="button-list" class="button-list">
      <!-- Buttons rendered by JS -->
    </div>

    <div class="footer">
      <a href="#" id="open-settings">Settings</a>
    </div>
  </div>
  <script src="scripts/popup.js"></script>
</body>
</html>
